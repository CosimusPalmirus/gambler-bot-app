<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Gambler Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
/* BTC Particles background */
#btc-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.bp{position:absolute;top:-50px;animation:bpfall linear infinite;will-change:transform;font-weight:bold;}
@keyframes bpfall{
  0%{transform:translateY(-50px) rotate(0deg);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}
.top-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:340px;height:220px;background:radial-gradient(ellipse,rgba(255,215,0,.18),transparent 70%);
  pointer-events:none;z-index:0;}
.logo-mark-img{width:42px;height:42px;border-radius:50%;
  display:block;object-fit:cover;
  box-shadow:0 0 18px rgba(57,255,20,.4),0 4px 14px rgba(0,0,0,.4),0 0 0 2px rgba(57,255,20,.2);
  animation:logofloat 4s ease-in-out infinite;}
@keyframes logofloat{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-2px) rotate(2deg);}}
.logo-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-txt{font-family:'Russo One',sans-serif;font-size:15px;font-weight:900;letter-spacing:.5px;
  background:linear-gradient(135deg,#39ff14 0%,#ffd700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(57,255,20,.3);}
:root{
  --bg:#08090d; --bg2:#0d1015; --card:#14182a; --card2:#1a1f33;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.15);
  --txt:#fff; --txt2:#9ca3af; --txt3:#6b7280;
  --gold:#ffd700; --gold2:#f59e0b;
  --gn:#39ff14; --gn2:#10b981;
  --rd:#ef4444; --rd2:#dc2626;
  --pu:#8b5cf6; --bl:#3b82f6;
  --r:10px; --r2:14px;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--txt);
  font-family:'Inter',-apple-system,sans-serif;overflow:hidden;
  -webkit-user-select:none;user-select:none;}
body{position:relative;}

#app{position:relative;width:100%;height:100vh;overflow:hidden;}

.screen{display:none;position:absolute;top:0;left:0;right:0;bottom:0;
  flex-direction:column;background:var(--bg);}
.screen.active{display:flex;}

#loading{position:absolute;inset:0;z-index:1000;pointer-events:none;
  background:var(--bg);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;transition:opacity .3s;}
#loading.hide{opacity:0;}
.ld-spin{width:50px;height:50px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
.ld-logo{width:160px;height:160px;border-radius:50%;
  box-shadow:0 0 50px rgba(57,255,20,.5),0 0 100px rgba(255,215,0,.3),0 0 0 3px rgba(57,255,20,.3);
  animation:ldpulse 2s ease-in-out infinite;display:block;margin-bottom:20px;}
@keyframes ldpulse{0%,100%{transform:scale(1);box-shadow:0 0 50px rgba(57,255,20,.5),0 0 100px rgba(255,215,0,.3),0 0 0 3px rgba(57,255,20,.3);}50%{transform:scale(1.04);box-shadow:0 0 70px rgba(57,255,20,.7),0 0 130px rgba(255,215,0,.5),0 0 0 4px rgba(57,255,20,.5);}}
.ld-name{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:3px;
  background:linear-gradient(135deg,#39ff14,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:24px;text-shadow:0 0 20px rgba(57,255,20,.3);}
@keyframes spin{to{transform:rotate(360deg);}}
.ld-txt{font-family:'Russo One';color:var(--gold);font-size:14px;letter-spacing:3px;}

.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:rgba(8,9,13,.95);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.hdr-logo{font-family:'Russo One';font-size:15px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-spacer{flex:1;}
.lvl-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);
  padding:4px 8px;border-radius:8px;border:1px solid var(--border);
  font-size:10px;font-weight:600;}
.lvl-badge .lv-num{color:var(--gold);}
.back-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);
  border:1px solid var(--border);color:var(--txt);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;}
.back-btn:active{background:rgba(255,255,255,.12);transform:scale(.95);}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}

.bnav{display:flex;background:rgba(8,9,13,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);flex-shrink:0;z-index:10;}
.bnav-btn{flex:1;padding:10px 4px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;background:none;border:none;
  color:var(--txt3);font-size:10px;font-family:inherit;transition:color .15s;}
.bnav-btn.on{color:var(--gold);}
.bnav-btn .ic{font-size:20px;line-height:1;}
